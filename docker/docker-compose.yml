services:
  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-service
      - dashboard

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mediscribe
      POSTGRES_USER: mediscribe
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mediscribe}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediscribe"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgres://mediscribe:${DB_PASSWORD:-mediscribe}@postgres:5432/mediscribe
      OLLAMA_API: http://ai-service:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      API_KEY: ${API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  sync-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgres://mediscribe:${DB_PASSWORD:-mediscribe}@postgres:5432/mediscribe
      OLLAMA_API: http://ai-service:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      SERVICE_ROLE: sync
      PORT: 3002
      NODE_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api-service

  ai-service:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_MODELS: /root/.ollama

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-service

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3003:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-mediscribe}
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  ollama_data:
  grafana_data:
